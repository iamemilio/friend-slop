name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.3"

jobs:
  lint:
    name: GDScript lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Verify pinned versions
        run: make verify-pinned-versions

      - name: Install Python tooling
        run: make setup-dev

      - name: Run gdlint
        run: make lint

  test:
    name: Godot unit tests
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot import data
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ env.GODOT_VERSION }}-${{ hashFiles('project.godot', '**/*.import') }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-

      - name: Bootstrap CI container tools
        run: bash tools/ci_container_bootstrap.sh

      - name: Run unit tests
        run: make test GODOT=godot
