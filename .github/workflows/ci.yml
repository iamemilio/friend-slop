name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.3"
  GODOT_CI_VERBOSE: "1"

jobs:
  lint:
    name: GDScript lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Verify pinned versions
        run: make verify-pinned-versions

      - name: Install Python tooling
        run: make setup-dev

      - name: Run gdlint
        run: make lint

  test:
    name: Godot unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: godot-bin-cache
        uses: actions/cache@v4
        with:
          path: .cache/godot
          key: godot-bin-${{ env.GODOT_VERSION }}-${{ hashFiles('tools/versions.env') }}

      - name: Cache Godot import data
        id: godot-import-cache
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ env.GODOT_VERSION }}-${{ hashFiles('project.godot', '**/*.import') }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-

      - name: Restore GodotSteam cache
        id: steam-cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/steam-setup
            addons/godotsteam
          key: steam-${{ hashFiles('tools/versions.env') }}

      - name: Log cache status
        run: |
          source tools/ci_log.sh
          ci_log "Godot binary cache hit: ${{ steps.godot-bin-cache.outputs.cache-hit }}"
          ci_log "Godot import cache hit: ${{ steps.godot-import-cache.outputs.cache-hit }}"
          ci_log "GodotSteam cache hit: ${{ steps.steam-cache.outputs.cache-hit }}"

      - name: Install Godot
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip libfontconfig1
          bash tools/setup_godot_linux.sh

      - name: Install GodotSteam
        run: bash tools/run_setup_steam.sh

      - name: Import project assets
        run: bash tools/run_godot_import.sh

      - name: Run unit tests
        run: bash tools/run_godot_tests.sh
